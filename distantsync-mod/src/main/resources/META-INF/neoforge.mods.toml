modLoader = "javafml"
loaderVersion = "[4,)"
license = "MIAOU2922"
issueTrackerURL = "https://github.com/MIAOU2922/map-sync/issues"

[[mods]]
modId = "distantsync"
version = "21.1.228-1"
displayName = "DistantSync"
displayURL = "https://github.com/MIAOU2922/map-sync"
credits = "MIAOU2922"
authors = "MIAOU2922"
description = '''
Bridges Distant Horizons LOD chunks to minimap mods (VoxelMap, JourneyMap, Xaero's), filling unexplored areas with LOD terrain data.
'''

[[dependencies.distantsync]]
modId = "neoforge"
type = "required"
versionRange = "[${neoforge_version},)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.distantsync]]
modId = "minecraft"
type = "required"
versionRange = "[${minecraft_version},)"
ordering = "NONE"
side = "CLIENT"

# Distant Horizons dependency
[[dependencies.distantsync]]
modId = "distanthorizons"
type = "required"
versionRange = "*"
ordering = "AFTER"
side = "CLIENT"

# Optional dependencies (map mods)
[[dependencies.distantsync]]
modId = "voxelmap"
type = "optional"
versionRange = "*"
ordering = "AFTER"
side = "CLIENT"

[[dependencies.distantsync]]
modId = "journeymap"
type = "optional"
versionRange = "*"
ordering = "AFTER"
side = "CLIENT"

[[dependencies.distantsync]]
modId = "xaeroworldmap"
type = "optional"
versionRange = "*"
ordering = "AFTER"
side = "CLIENT"
